<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerIntelli AI - Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<video class="app-bg-video" autoplay loop muted preload="auto">
    <source src="{{ url_for('roadmap_page_routes.roadmap_assets', filename='bg.mp4') }}" type="video/mp4">
</video>
<div class="app-bg-overlay" aria-hidden="true"></div>


<!-- 🌌 BACKGROUND -->
<div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- 🔥 TOPBAR -->
<div class="topbar">
    <div class="top-actions">
        <a href="{{ url_for('home.dashboard') }}" class="back-btn">← Dashboard</a>
    </div>
</div>

<div class="page-center">

    <!-- HEADER -->
    <div class="header">
        <div>
            <h1>👤 Profile Settings</h1>
            <p>Update your personal information and preferences</p>
        </div>
    </div>

    <!-- PROFILE FORM -->
    <div class="profile-card glass">

        <form method="POST" action="{{ url_for('profile.update_profile') }}" enctype="multipart/form-data">

            <!-- PROFILE IMAGE -->
            <div class="profile-image-section">

                {% if profile and profile.profile_photo %}
                <img src="{{ url_for('static', filename=profile.profile_photo) }}" class="profile-pic" alt="Profile photo">
                {% else %}
                <img src="{{ url_for('static', filename='images/default.png') }}" class="profile-pic" alt="Default profile photo">
                {% endif %}

                <label for="profile_photo">Profile Photo</label>
                <input id="profile_photo" type="file" name="profile_photo">
            </div>

            <!-- USER INFO -->
            <div class="form-grid">

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" value="{{ user.first_name }}" readonly title="First name">
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" value="{{ user.last_name }}" readonly title="Last name">
                </div>

                <div class="form-group full">
                    <label>Email</label>
                    <input type="email" value="{{ user.email }}" readonly title="Email address">
                </div>

                <div class="form-group">
                    <label>Current Role</label>
                    <input type="text" name="current_role"
                        value="{{ profile.current_role if profile else '' }}" placeholder="Student / Developer / Analyst">
                </div>

                <div class="form-group">
                    <label>Experience</label>
                    <input type="number" name="experience"
                        value="{{ profile.years_of_experience if profile else '' }}" placeholder="0">
                </div>

                <div class="form-group full">
                    <label>Skills</label>
                    <textarea name="skills" rows="3" placeholder="Python, Machine Learning, SQL">
{% if profile and profile.skills %}{{ profile.skills | join(', ') }}{% endif %}
                    </textarea>
                </div>

                <div class="form-group full">
                    <label>Interests</label>
                    <textarea name="interests" rows="3" placeholder="AI, Data Science, Web Development">
{% if profile and profile.interests %}{{ profile.interests | join(', ') }}{% endif %}
                    </textarea>
                </div>

                <div class="form-group">
                    <label>CGPA</label>
                    <input type="number" step="0.01" min="0" max="10"
                        name="cgpa"
                        value="{{ profile.cgpa if profile else '' }}" placeholder="0.00 - 10.00">
                </div>

                <div class="form-group">
                    <label>Upload Resume</label>
                    <input type="file" name="resume" title="Upload resume">

                    {% if profile and profile.resume_file %}
                    <a class="resume-link"
                       href="{{ url_for('static', filename=profile.resume_file) }}"
                       target="_blank">
                       View Resume
                    </a>
                    {% endif %}
                </div>

            </div>

            <button type="submit" class="btn-primary">
                Save Profile
            </button>

        </form>

    </div>

    {% set chatbot_page = 'profile' %}
    {% include 'shared/chatbot_widget.html' %}

</body>
</html>
