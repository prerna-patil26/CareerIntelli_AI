<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Prediction Results - CareerIntelli AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <video class="app-bg-video" autoplay loop muted preload="auto">
        <source src="{{ url_for('roadmap_page_routes.roadmap_assets', filename='bg.mp4') }}" type="video/mp4">
    </video>
    <div class="app-bg-overlay" aria-hidden="true"></div>
    <div class="container">
        <header>
            <h1>CareerIntelli AI</h1>
            <nav>
                <ul>
                    <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                    <li><a href="{{ url_for('logout') }}">Logout</a></li>
                </ul>
            </nav>
        </header>
        
        <main>
            <section class="results-section">
                <h2>Career Prediction Results</h2>
                
                <div class="career-matches">
                    <h3>Recommended Career Paths:</h3>
                    <div id="career-list" class="career-list">
                        <!-- Results will be populated here -->
                    </div>
                </div>
                
                <div class="actions">
                    <button class="btn-primary" onclick="startInterview()">Start Interview Prep</button>
                    <button class="btn-secondary" onclick="viewRoadmap()">View Learning Roadmap</button>
                    <button class="btn-secondary" onclick="backToDashboard()">Back to Dashboard</button>
                </div>
            </section>
        </main>
    </div>

    {% set chatbot_page = 'career-result' %}
    {% include 'shared/chatbot_widget.html' %}
    
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
