<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Interview</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/interview.css') }}">
</head>

<body>
    <!-- 🔥 LOADER -->
<div id="loader" style="display:none;">
    <div class="loader-box">
        <div class="spinner"></div>
        <p>Analyzing your interview...</p>
    </div>
</div>

<div class="main-container">

    <!-- 🎥 CAMERA -->
    <div class="camera-section">
        <video id="interview-video" autoplay></video>
        <div class="bot-icon">🤖</div>
    </div>

    <!-- 🧠 RIGHT PANEL -->
    <div class="question-section">

        <h2>Select Domain</h2>

        <input type="text" id="searchBox" placeholder="Search domain...">
        <ul id="domainList"></ul>

        <button onclick="startInterview()">Start Interview</button>

        <div id="interviewSection" style="display:none;">

            <h3 id="questionText"></h3>

            <!-- ✅ UPDATED BUTTONS ONLY -->
            <button onclick="startSpeechRecognition()">🎤 Start Speaking</button>
            <button onclick="stopSpeechRecognition()">⛔ Stop</button>

            <p><b>Your Answer:</b></p>
            <p id="answerText"></p>

            <button id="nextBtn" onclick="nextQuestion()">Next</button>
            
        </div>

    </div>

</div>
<div id="warningBox" style="display:none;"></div>

<!-- ✅ ONLY THIS JS -->
<script src="{{ url_for('static', filename='js/interview.js') }}"></script>

</body>
</html>
