<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview - CareerIntelli AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>CareerIntelli AI - Interview</h1>
        </header>
        
        <main>
            <section class="interview-section">
                <div class="video-container">
                    <video id="interview-video" width="400" autoplay></video>
                </div>
                
                <div class="interview-content">
                    <h2 id="question-number">Question 1 of 5</h2>
                    <div class="question-box">
                        <p id="question-text">Loading question...</p>
                    </div>
                    
                    <div class="interview-controls">
                        <button id="start-recording" class="btn-primary" onclick="startRecording()">Start Recording</button>
                        <button id="stop-recording" class="btn-danger hidden" onclick="stopRecording()">Stop Recording</button>
                    </div>
                    
                    <div class="timer" id="timer">00:00</div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/interview.js') }}"></script>
</body>
</html>
