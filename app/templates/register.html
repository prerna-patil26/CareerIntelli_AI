<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerIntelli AI - Register</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>

    </style>
</head>

<body class="auth-page">
    <video class="app-bg-video" autoplay loop muted preload="auto">
        <source src="{{ url_for('roadmap_page_routes.roadmap_assets', filename='bg.mp4') }}" type="video/mp4">
    </video>
    <div class="app-bg-overlay" aria-hidden="true"></div>
    <div class="logo-top">
        <!-- <video autoplay loop muted playsinline class="logo-video">
            <source src="{{ url_for('static', filename='videos/logo large.gif') }}" type="video/gif">
        </video> -->
        <!-- <video autoplay loop muted playsinline class="logo-video">
            <source src="{{ url_for('static', filename='videos/logo3.mp4') }}" type="video/mp4">
        </video> -->

    </div>

    <!-- 🔵 RIGHT SIDE FORM -->
    <div class="auth-container" style=" justify-content: center;  
  padding-right: 0; max-width: 1200px;
  margin: auto;">
        <div class="auth-box" style="max-width: 420px;
  width: 90%;">

            <h2>Create Account</h2>
            <p class="subtitle">Start your career journey with AI</p>

            <form method="POST">
                <div class="row">
                    <div class="input-group">
                        <input type="text" name="first_name" placeholder=" " required>
                        <label>First Name</label>
                    </div>

                    <div class="input-group">
                        <input type="text" name="last_name" placeholder=" " required>
                        <label>Last Name</label>
                    </div>
                </div>

                <!-- EMAIL -->
                <div class="input-group" >
                    <input type="email" name="email" placeholder=" " required>
                    <label>Email</label>
                </div>

                <!-- PASSWORD -->
                <div class="input-group password-group">
                    <input type="password" name="password" id="password" placeholder=" " required>
                    <label>Password</label>
                    <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="input-group password-group">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder=" " required>
                    <label>Confirm Password</label>
                    <span class="toggle-password" onclick="togglePassword('confirm_password', this)">👁</span>
                </div>
            

                <button type="submit" id="registerBtn">Create Account</button>

            </form>

            <p class="auth-link">
                Already have an account?
                <a href="{{ url_for('auth.login_page') }}">Login</a>
            </p>

        </div>
    </div>

    <!-- 🔥 PASSWORD TOGGLE -->
    <script>
        function togglePassword(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                el.textContent = "🙈";
            } else {
                input.type = "password";
                el.textContent = "👁";
            }
        }
    </script>

</body>
</html>
