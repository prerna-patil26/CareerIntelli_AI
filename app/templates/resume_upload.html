<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analyzer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/career.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/resume.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/interview.css') }}">

</head>

<body>

<!-- 🎥 BACKGROUND -->
<video class="app-bg-video" autoplay loop muted>
    <source src="{{ url_for('roadmap_page_routes.roadmap_assets', filename='bg.mp4') }}">
</video>
<div class="app-bg-overlay"></div>

    <div class="career-top-nav">
        <a class="career-dashboard-btn" href="{{ url_for('home.dashboard') }}">Dashboard</a>
    </div>

<main class="interview-shell">

    <!-- 🔥 INTRO -->
    <section class="intro-screen">
        <div class="intro-copy">

            <p class="intro-eyebrow">✨ AI Resume Analyzer</p>
            <h1>Resume Analyzer</h1>

            <p class="intro-subtitle">
                Upload your resume and get AI-powered feedback to improve your chances of getting hired.
            </p>

            <!-- 🔥 KEEP YOUR ORIGINAL UPLOAD UI -->
            <form id="resumeForm"
                method="POST"
                action="{{ url_for('resume.upload_resume') }}"
                enctype="multipart/form-data">

                <div class="upload-wrapper">

                    <div class="upload-box">

                        <p>📂 Drag & Drop Resume</p>
                        <span>or</span>

                        <input type="file" name="file" id="fileInput" hidden required>

                        <button type="button" onclick="document.getElementById('fileInput').click()">
                            Choose File
                        </button>

                        <p class="file-name" id="fileName">No file selected</p>
                        <small>Supported: PDF, DOCX</small>

                    </div>

                    <!-- BUTTON (inside outer box but outside inner box) -->
                    <button type="button" class="upload-btn" onclick="startResumeAnalysis()">
                    Analyze Resume
                    </button>

                </div>

                <!-- 🔥 CHANGE ONLY THIS BUTTON
                <button type="button" class="upload-btn" onclick="startResumeAnalysis()">
                    🚀 Analyze Resume
                </button> -->

            </form>

        </div>
    </section>

    <!-- 🔥 POPUP LOADER -->
    <section class="popup-overlay" id="resumePopup">
        <div class="popup-card">

            <div class="popup-robot-wrap">
                <img class="popup-robot"
                     src="{{ url_for('roadmap_page_routes.roadmap_assets', filename='robo.png') }}">
            </div>

            <div class="popup-copy">
                <p class="popup-eyebrow">AI Resume Analysis</p>
                <h2>Analyzing your resume</h2>
                <p>Please wait while AI reviews your resume.</p>
            </div>

            <div class="popup-spinner-row">
                <span></span><span></span><span></span>
            </div>

        </div>
    </section>

</main>

<script>

// 📂 Trigger file picker
function triggerUpload() {
    document.getElementById("fileInput").click();
}

// 📌 Get elements
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const uploadBox = document.querySelector(".upload-box");

// 📄 Show file name ONLY (no loader here ❌)
fileInput.addEventListener("change", function () {
    if (this.files[0]) {
        fileName.textContent = this.files[0].name;
    }
});

// 🚀 Start analysis (ONLY here loader should show ✅)
function startResumeAnalysis() {

    if (!fileInput.files[0]) {
        alert("Please select a file first");
        return;
    }

    // 🔥 Show loader
    document.getElementById("resumePopup").classList.add("is-visible");

    // 🔥 Disable button (optional but good UX)
    const btn = document.querySelector(".upload-btn");
    btn.disabled = true;
    btn.innerText = "Analyzing...";

    // 🔥 Submit form after delay
    setTimeout(() => {
        document.getElementById("resumeForm").submit();
    }, 1500);
}

// =====================
// 🔥 DRAG & DROP
// =====================

// Drag over
uploadBox.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadBox.classList.add("dragover");
});

// Drag leave
uploadBox.addEventListener("dragleave", () => {
    uploadBox.classList.remove("dragover");
});

// Drop file
uploadBox.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadBox.classList.remove("dragover");

    const file = e.dataTransfer.files[0];

    if (file) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = file.name;
    }
});

</script>

</body>
</html>
